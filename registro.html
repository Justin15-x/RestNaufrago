<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro - El Náufrago</title>

<link rel="stylesheet" href="css/style.css">

<style>
.login-box {
    max-width: 350px;
    margin: auto;
    padding: 20px;
}

input, button {
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    background:#004466;
    color:white;
}

.msg{
    color:red;
}

.link{
    text-align:center;
    display:block;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://www.google.com/recaptcha/api.js" async defer></script>

</head>

<body>

<div class="login-box">

<h2>Registro</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<div class="g-recaptcha" data-sitekey="6LcyipksAAAAAPUuodqJ2enwXh89G50IuuJdvEpQ"></div>

<button onclick="handleRegister()">Registrarse</button>

<a class="link" href="login.html">¿Ya tienes cuenta? Inicia sesión</a>

<div class="msg" id="msg"></div>

</div>

<script type="module">
const supabase = window.supabase.createClient(
  "https://bdngrgorvczujhkyzbkl.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkbmdyZ29ydmN6dWpoa3l6YmtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MzYxMzAsImV4cCI6MjA4NjUxMjEzMH0.yjvRSBZ33VkL0JYgUtHUDNYybA2GUFvMMOnyyYbYOUo"
);

window.handleRegister = async () => {

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const msg = document.getElementById("msg");

    const token = grecaptcha.getResponse();

    if(!token){
        msg.textContent = "Verifica el captcha";
        return;
    }

    try{

        // 🔐 validar captcha
        const { data: captchaData, error: error1 } = await supabase.functions.invoke(
            "verify-captcha",
            { body: { token } }
        );

        console.log("captchaData:", captchaData);

        if(error1){
            console.error(error1);
            msg.textContent = "Error verificando captcha";
            return;
        }

        if(!captchaData || captchaData.success !== true){
            msg.textContent = "Captcha inválido";
            return;
        }

        // 🔐 registro
        const { error } = await supabase.auth.signUp({
            email,
            password
        });

        if(error) throw error;

        msg.style.color = "green";
        msg.textContent = "Registro exitoso";

    }catch(err){
        msg.textContent = err.message;
    }
};
</script>

</body>
</html>

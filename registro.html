<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - El Náufrago</title>
    <link rel="stylesheet" href="css/style.css">

    <style>
        .login-box {
            max-width: 350px;
            margin: auto;
            padding: 20px;
            font-family: sans-serif;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            box-sizing: border-box;
        }
        button {
            background: #004466;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:disabled {
            background: #ccc;
        }
        .msg {
            color: red;
            margin-top: 10px;
            text-align: center;
        }
        .link {
            text-align: center;
            display: block;
            margin-top: 10px;
            text-decoration: none;
            color: #004466;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>

<body>

<div class="login-box">
    <h2>Registro</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <div class="g-recaptcha" data-sitekey="6LcyipksAAAAAPUuodqJ2enwXh89G50IuuJdvEpQ"></div>

    <button id="btnRegister" onclick="handleRegister()">Registrarse</button>

    <a class="link" href="login.html">¿Ya tienes cuenta? Inicia sesión</a>
    <div class="msg" id="msg"></div>
</div>

<script type="module">
    // Configuración de Supabase
    const supabase = window.supabase.createClient(
        "https://bdngrgorvczujhkyzbkl.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkbmdyZ29ydmN6dWpoa3l6YmtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MzYxMzAsImV4cCI6MjA4NjUxMjEzMH0.yjvRSBZ33VkL0JYgUtHUDNYybA2GUFvMMOnyyYbYOUo"
    );

    // Definimos la función en el objeto window para que el HTML pueda verla
    window.handleRegister = async () => {
        const btn = document.getElementById("btnRegister");
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const msg = document.getElementById("msg");

        // 1. Obtener token de reCAPTCHA
        const token = grecaptcha.getResponse();

        if (!token) {
            msg.style.color = "red";
            msg.textContent = "Por favor, verifica el captcha.";
            return;
        }

        // 2. Bloquear interfaz para evitar envíos dobles
        btn.disabled = true;
        btn.textContent = "Procesando...";
        msg.textContent = "";

        try {
            // 3. Validar Captcha llamando a tu Edge Function
            // Usamos "dynamic-function" que es el nombre que definimos antes
            const { data: captchaData, error: errorFunc } = await supabase.functions.invoke(
                "dynamic-function",
                { body: { token } }
            );

            console.log("Respuesta Captcha:", captchaData);

            if (errorFunc || !captchaData?.success) {
                const errorDetail = captchaData?.['error-codes'] ? captchaData['error-codes'][0] : "Token inválido";
                throw new Error(`Error de Captcha: ${errorDetail}`);
            }

            // 4. Si el captcha es exitoso, proceder al Registro
            const { data: authData, error: authError } = await supabase.auth.signUp({
                email,
                password
            });

            if (authError) throw authError;

            // ÉXITO
            msg.style.color = "green";
            msg.textContent = "¡Registro exitoso! Revisa tu bandeja de entrada.";
            btn.textContent = "¡Listo!";
            
            // Limpiar campos
            grecaptcha.reset();

        } catch (err) {
            console.error("Error en proceso:", err.message);
            msg.style.color = "red";
            msg.textContent = err.message;
            
            // RESETEAR para permitir nuevo intento
            grecaptcha.reset();
            btn.disabled = false;
            btn.textContent = "Registrarse";
        }
    };
</script>

</body>
</html>

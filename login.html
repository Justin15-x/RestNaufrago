<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>El Náufrago - Login</title>
    <link rel="stylesheet" href="css/style.css">

    <style>
        .login-box {
            max-width: 350px;
            margin: 0 auto;
            padding: 20px;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            box-sizing: border-box;
        }

        button{
            width:100%;
            padding:10px;
            cursor:pointer;
            background-color: #004466;
            color:white;
        }

        .msg{
            margin-top:10px;
            color:red;
        }

        .link{
            margin-top:10px;
            display:block;
            text-align:center;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>

<body>

<header>
    <nav>
        <h1>⚓ El Náufrago</h1>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="menu.html">Menú</a></li>
            <li><a href="contacto.html">Contáctanos</a></li>
            <li><a href="login.html">Sistema Interno</a></li>
        </ul>
    </nav>
</header>

<div class="container">
    <div class="hero">
        <h2>Ingreso al sistema interno</h2>

        <div class="login-box">

            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <input type="text" id="otp" placeholder="Código OTP">

            <div class="g-recaptcha" data-sitekey="6LcyipksAAAAAPUuodqJ2enwXh89G50IuuJdvEpQ"></div>

            <button onclick="handleLogin()">Entrar</button>
            <a style="color: azure;" href="reset.html">¿Olvidaste tu contraseña?</a>
            <a style="color: azure;" class="link" href="registro.html">¿No tienes cuenta? Regístrate</a>

            <div class="msg" id="msg"></div>
        </div>
    </div>
</div>


<script type="module">
    // 1. Configuración inicial
    const supabase = window.supabase.createClient(
        "https://bdngrgorvczujhkyzbkl.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkbmdyZ29ydmN6dWpoa3l6YmtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MzYxMzAsImV4cCI6MjA4NjUxMjEzMH0.yjvRSBZ33VkL0JYgUtHUDNYybA2GUFvMMOnyyYbYOUo"
);
    // Definimos la función globalmente para que el botón pueda verla
    window.handleLogin = async () => {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const msg = document.getElementById("msg");
        const token = grecaptcha.getResponse();

        if (!email) { msg.textContent = "Ingresa tu email"; return; }
        if (!token) { msg.textContent = "Verifica el captcha"; return; }

        try {
            // --- PASO 1: COMPROBAR BLOQUEO (Antes de nada) ---
            const { data: attemptData } = await supabase
                .from("login_attempts")
                .select("*")
                .eq("email", email)
                .single();

            if (attemptData && attemptData.blocked_until && new Date(attemptData.blocked_until) > new Date()) {
                msg.textContent = "Cuenta bloqueada temporalmente";
                return;
            }

            // --- PASO 2: VALIDAR CAPTCHA (Edge Function) ---
            const { data: captchaData } = await supabase.functions.invoke(
                "verify-captcha",
                { body: { token } }
            );

            if (!captchaData?.success) {
                msg.textContent = "Captcha inválido";
                return;
            }

            // --- PASO 3: INTENTAR LOGIN ---
            const { data: authData, error: authError } = await supabase.auth.signInWithPassword({
                email,
                password
            });

            // --- PASO 4: SI EL LOGIN FALLA ---
            if (authError) {
                const newAttempts = (attemptData?.attempts || 0) + 1;
                await supabase.from("login_attempts").upsert({
                    email,
                    attempts: newAttempts,
                    blocked_until: newAttempts >= 5 
                        ? new Date(Date.now() + 10 * 60000) 
                        : null
                });
                throw authError;
            }

            // --- PASO 5: SI EL LOGIN ES CORRECTO ---
            // A. Limpiar intentos fallidos
            await supabase.from("login_attempts").delete().eq("email", email);

            // B. Generar y enviar código MFA (Simulado)
            const user = authData.user;
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            
            await supabase.from("mfa_codes").insert({
                user_id: user.id,
                code: code,
                expires_at: new Date(Date.now() + 5 * 60000)
            });

            alert("Tu código de verificación es: " + code);
            msg.style.color = "green";
            msg.textContent = "Código enviado. Ingrésalo para continuar.";

            // Aquí podrías mostrar el campo OTP que tienes oculto o redirigir
            // a la función verifyOTP cuando el usuario escriba el código.

        } catch (err) {
            msg.style.color = "red";
            msg.textContent = err.message;
        }
    };

    // Función para verificar el OTP (se llamaría desde otro botón o evento)
    window.verifyOTP = async (userId, code) => {
        const { data } = await supabase
            .from("mfa_codes")
            .select("*")
            .eq("user_id", userId)
            .eq("code", code)
            .eq("used", false)
            .single();

        if (!data || new Date(data.expires_at) < new Date()) {
            alert("Código inválido o expirado");
            return false;
        }

        await supabase.from("mfa_codes").update({ used: true }).eq("id", data.id);
        
        // Registrar sesión final
        await supabase.from("sessions").insert({
            user_id: userId,
            user_agent: navigator.userAgent
        });

        window.location = "dashboard.html";
    };

</script>

</body>
</html>

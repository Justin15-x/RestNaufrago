<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>El Náufrago - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-box { max-width: 350px; margin: 0 auto; padding: 20px; }
        input, button { width:100%; padding:10px; margin:10px 0; box-sizing: border-box; }
        button { cursor:pointer; background-color: #004466; color:white; border:none; font-weight: bold; }
        button:disabled { background-color: #ccc; }
        .msg { margin-top:10px; text-align: center; font-weight: 500; }
        .link { margin-top:10px; display:block; text-align:center; color: azure; text-decoration: none; font-size: 0.9em; }
        #otp-section { display: none; border-top: 1px solid #ccc; margin-top: 10px; padding-top: 10px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>

<header>
    <nav>
        <h1>⚓ El Náufrago</h1>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="menu.html">Menú</a></li>
            <li><a href="login.html">Sistema Interno</a></li>
        </ul>
    </nav>
</header>

<div class="container">
    <div class="hero">
        <h2>Ingreso al sistema interno</h2>
        <div class="login-box">
            <div id="login-fields">
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="password" placeholder="Password">
                <div class="g-recaptcha" data-sitekey="6LcyipksAAAAAPUuodqJ2enwXh89G50IuuJdvEpQ"></div>
                <button id="btnLogin" onclick="handleLogin()">Entrar</button>
            </div>

            <div id="otp-section">
                <p style="color:white; font-size: 0.9em;">Introduce el código de 6 dígitos:</p>
                <input type="text" id="otp" placeholder="000000">
                <button id="btnVerify" onclick="handleVerifyOTP()">Verificar Acceso</button>
            </div>

            <a class="link" href="reset.html">¿Olvidaste tu contraseña?</a>
            <a class="link" href="registro.html">¿No tienes cuenta? Regístrate</a>
            <div class="msg" id="msg"></div>
        </div>
    </div>
</div>

<script type="module">
    const supabase = window.supabase.createClient(
        "https://bdngrgorvczujhkyzbkl.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkbmdyZ29ydmN6dWpoa3l6YmtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MzYxMzAsImV4cCI6MjA4NjUxMjEzMH0.yjvRSBZ33VkL0JYgUtHUDNYybA2GUFvMMOnyyYbYOUo"
    );

    let currentUserId = null;

    window.handleLogin = async () => {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const msg = document.getElementById("msg");
        const btn = document.getElementById("btnLogin");
        const captchaResponse = grecaptcha.getResponse();

        if (!email || !password || !captchaResponse) { 
            msg.style.color = "orange";
            msg.textContent = "Email, Password y Captcha son obligatorios"; 
            return; 
        }

        btn.disabled = true;
        btn.textContent = "Validando...";

        try {
            // 1. Verificar Intentos (Fuerza Bruta) 
            const { data: attemptData } = await supabase
                .from("login_attempts")
                .select("*")
                .eq("email", email)
                .maybeSingle();

            if (attemptData?.blocked_until && new Date(attemptData.blocked_until) > new Date()) {
                throw new Error("Demasiados intentos. Bloqueado hasta: " + new Date(attemptData.blocked_until).toLocaleTimeString());
            }

            // 2. Auth Supabase
            const { data: authData, error: authError } = await supabase.auth.signInWithPassword({ email, password });

            if (authError) {
                const newAttempts = (attemptData?.attempts || 0) + 1;
                await supabase.from("login_attempts").upsert({
                    email,
                    attempts: newAttempts,
                    blocked_until: newAttempts >= 5 ? new Date(Date.now() + 15 * 60000).toISOString() : null
                });
                throw authError;
            }

            // 3. Generar OTP (MFA) [cite: 200, 247]
            currentUserId = authData.user.id;
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            
            await supabase.from("mfa_codes").insert({
                user_id: currentUserId,
                code: code,
                expires_at: new Date(Date.now() + 5 * 60000).toISOString()
            });

            alert("🛡️ CÓDIGO MFA: " + code); [cite: 249]
            
            document.getElementById("login-fields").style.display = "none";
            document.getElementById("otp-section").style.display = "block";
            msg.style.color = "green";
            msg.textContent = "Paso 1 completado. Verifique su código.";

        } catch (err) {
            msg.style.color = "red";
            msg.textContent = err.message;
            btn.disabled = false;
            btn.textContent = "Entrar";
            grecaptcha.reset();
        }
    };

    window.handleVerifyOTP = async () => {
        const codeInput = document.getElementById("otp").value;
        const msg = document.getElementById("msg");
        const btn = document.getElementById("btnVerify");

        try {
            btn.disabled = true;
            
            // A. Validar OTP [cite: 251]
            const { data: mfaData } = await supabase
                .from("mfa_codes")
                .select("*")
                .eq("user_id", currentUserId)
                .eq("code", codeInput)
                .eq("used", false)
                .maybeSingle();

            if (!mfaData) throw new Error("Código incorrecto o expirado");

            await supabase.from("mfa_codes").update({ used: true }).eq("id", mfaData.id);

            // B. Registrar Multisesión (Requisito Práctica) [cite: 278, 281]
            await supabase.from("sessions").insert({
                user_id: currentUserId,
                user_agent: navigator.userAgent,
                ip_address: "IP_SIMULADA" // En hosting real se obtiene del server
            });

            // C. Consultar Rol con Manejo de Error [cite: 8, 262]
            const { data: profile } = await supabase
                .from("profiles")
                .select("role")
                .eq("id", currentUserId)
                .maybeSingle();

            const role = profile?.role || 'mesero'; [cite: 266]

            // D. Redirección [cite: 164, 268]
            msg.style.color = "green";
            msg.textContent = "Acceso concedido. Redirigiendo...";
            
            setTimeout(() => {
                if (role === 'admin') window.location.href = "admin-dashboard.html";
                else if (role === 'cocina') window.location.href = "cocina.html";
                else if (role === 'barra') window.location.href = "barra.html";
                else window.location.href = "mesero-dashboard.html";
            }, 1500);

        } catch (err) {
            msg.style.color = "red";
            msg.textContent = err.message;
            btn.disabled = false;
        }
    };
</script>
</body>
</html>

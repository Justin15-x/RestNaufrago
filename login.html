<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>El Náufrago - Sistema Interno</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-box { max-width: 350px; margin: 0 auto; padding: 20px; }
        input, button { width:100%; padding:12px; margin:10px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { cursor:pointer; background-color: #004466; color:white; border:none; font-weight: bold; }
        button:disabled { background-color: #999; }
        .msg { margin-top:10px; text-align: center; font-weight: bold; min-height: 1.2em; }
        .link { margin-top:10px; display:block; text-align:center; color: #fff; text-decoration: none; font-size: 0.9em; }
        #otp-section { display: none; border-top: 2px solid rgba(255,255,255,0.2); margin-top: 15px; padding-top: 15px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>

<header>
    <nav>
        <h1>⚓ El Náufrago</h1>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="login.html">Acceso Staff</a></li>
        </ul>
    </nav>
</header>

<div class="container">
    <div class="hero">
        <h2>Sistema Interno</h2>
        <div class="login-box">
            <div id="login-fields">
                <input type="email" id="email" placeholder="Correo electrónico">
                <input type="password" id="password" placeholder="Contraseña">
                <div id="captcha-wrapper">
                <label style="display:block; font-size:20px; margin-bottom:6px; ">
                    Verificación: <span id="captcha-question">¿Cuánto es 8 + 16?</span>
                </label>
                <input type="number" id="captcha-input" placeholder="Tu respuesta"
                        oninput="checkCaptcha()" autocomplete="off" />
                <span id="captcha-feedback" style="font-size:13px; margin-left:8px;"></span>
                </div>
                <div class="g-recaptcha" data-sitekey="6LcyipksAAAAAPUuodqJ2enwXh89G50IuuJdvEpQ"></div>
                <button id="btnLogin" onclick="handleLogin()">Entrar al Sistema</button>
            </div>

            <div id="otp-section">
                <p style="color:white; font-size: 0.9em; margin-bottom:10px;">Introduce el código de seguridad (MFA):</p>
                <input type="text" id="otp" placeholder="Código de 6 dígitos" maxlength="6">
                <button id="btnVerify" onclick="handleVerifyOTP()">Confirmar Identidad</button>
            </div>

            <a class="link" href="reset.html">¿Olvidaste tu clave?</a>
            <a class="link" href="registro.html">Nuevo ingreso (Registro)</a>
            <div class="msg" id="msg"></div>
        </div>
    </div>
</div>

<script type="module">
    // 1. Configuración de variables del Captcha Matemático
    var _ca = 8, _cb = 16, _cc = 24;

    // Hacer estas funciones disponibles globalmente para el input y validación
    window.checkCaptcha = function() {
        var val = parseInt(document.getElementById('captcha-input').value);
        var fb  = document.getElementById('captcha-feedback');
        if (isNaN(val)) { fb.textContent = ''; return; }
        if (val === _cc) {
            fb.textContent = '✓ correcto';
            fb.style.color = 'lightgreen';
        } else {
            fb.textContent = '✗ incorrecto';
            fb.style.color = 'red';
        }
    }

    const supabase = window.supabase.createClient(
        "https://bdngrgorvczujhkyzbkl.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkbmdyZ29ydmN6dWpoa3l6YmtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MzYxMzAsImV4cCI6MjA4NjUxMjEzMH0.yjvRSBZ33VkL0JYgUtHUDNYybA2GUFvMMOnyyYbYOUo"
    );

    let currentUserId = null;

    window.handleLogin = async () => {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const mathVal = parseInt(document.getElementById('captcha-input').value);
        const msg = document.getElementById("msg");
        const btn = document.getElementById("btnLogin");
        const captchaRecaptcha = grecaptcha.getResponse();

        // VALIDACIÓN PREVIA
        if (!email || !password) { 
            msg.style.color = "#ffcc00";
            msg.textContent = "⚠ Email y Password requeridos"; 
            return; 
        }
        
        if (mathVal !== _cc) {
            msg.style.color = "red";
            msg.textContent = "⚠ Resuelve la suma correctamente";
            return;
        }

        if (!captchaRecaptcha) {
            msg.style.color = "red";
            msg.textContent = "⚠ Verifica el reCAPTCHA";
            return;
        }

        btn.disabled = true;
        btn.textContent = "Cargando...";

        try {
            // 1. Verificar Intentos (Fuerza Bruta - Práctica 1 Parte 8)
            const { data: attemptData } = await supabase
                .from("login_attempts")
                .select("*")
                .eq("email", email)
                .maybeSingle();

            if (attemptData?.blocked_until && new Date(attemptData.blocked_until) > new Date()) {
                throw new Error("Bloqueado por seguridad (10 min).");
            }

            // 2. Auth Principal de Supabase
            const { data: authData, error: authError } = await supabase.auth.signInWithPassword({ email, password });

            if (authError) {
                // Registrar intento fallido
                const attempts = (attemptData?.attempts || 0) + 1;
                await supabase.from("login_attempts").upsert({
                    email,
                    attempts,
                    blocked_until: attempts >= 5 ? new Date(Date.now() + 10 * 60000).toISOString() : null
                });
                throw authError;
            }

            // 3. VERIFICAR PERFIL (Aquí estaba tu error anterior)
            const { data: profile, error: profileError } = await supabase
                .from("profiles")
                .select("*")
                .eq("id", authData.user.id)
                .maybeSingle();

            if (!profile) {
                await supabase.auth.signOut(); 
                throw new Error("Cuenta desactivada o sin perfil configurado.");
            }

            // 4. Preparar OTP (MFA - Requisito Obligatorio)
            currentUserId = authData.user.id;
            const otpCode = Math.floor(100000 + Math.random() * 900000).toString();
            
            await supabase.from("mfa_codes").insert({
                user_id: currentUserId,
                code: otpCode,
                expires_at: new Date(Date.now() + 5 * 60000).toISOString()
            });

            // Simulamos el envío (En producción usarías un servicio de Email/SMS)
            alert("🔐 CÓDIGO MFA PARA STAFF: " + otpCode);
            
            document.getElementById("login-fields").style.display = "none";
            document.getElementById("otp-section").style.display = "block";
            msg.style.color = "lightgreen";
            msg.textContent = "Identidad validada. Ingresa tu código de 6 dígitos.";

        } catch (err) {
            msg.style.color = "red";
            msg.textContent = err.message;
            btn.disabled = false;
            btn.textContent = "Entrar al Sistema";
            grecaptcha.reset();
        }
    };

    window.handleVerifyOTP = async () => {
        const codeInput = document.getElementById("otp").value;
        const msg = document.getElementById("msg");
        const btn = document.getElementById("btnVerify");

        try {
            btn.disabled = true;
            
            // A. Validar OTP en base de datos
            const { data: mfaData } = await supabase
                .from("mfa_codes")
                .select("*")
                .eq("user_id", currentUserId)
                .eq("code", codeInput)
                .eq("used", false)
                .maybeSingle();

            if (!mfaData) throw new Error("Código incorrecto o ya utilizado");

            // Marcar código como usado
            await supabase.from("mfa_codes").update({ used: true }).eq("id", mfaData.id);

            // B. Registro de Sesión (Para que el Superusuario la vea)
            await supabase.from("sessions").insert({
                user_id: currentUserId,
                user_agent: navigator.userAgent
            });

            // C. Obtener el rol final para redirección
            const { data: profile } = await supabase
                .from("profiles")
                .select("role")
                .eq("id", currentUserId)
                .single();

            const role = profile?.role || 'mesero';
            msg.style.color = "lightgreen";
            msg.textContent = "✅ Acceso concedido.";

            setTimeout(() => {
                const routes = { admin: 'dashboard.html', cocina: 'cocina.html', barra: 'barra.html' };
                window.location.href = routes[role] || 'interno.html';
            }, 1000);

        } catch (err) {
            msg.style.color = "red";
            msg.textContent = err.message;
            btn.disabled = false;
        }
    };
</script>
</body>
</html>

     <style>
        
        .login-box {
        max-width: 350px; /* Controla qué tan ancho quieres el formulario */
        margin: 0 auto;  /* Lo centra horizontalmente */
        padding: 20px;
    }
        input{
            width:100%;

            margin:10px 0;

    <div class="login-box">
   

    <div class="box">
    <h2>Login</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <div class="g-recaptcha" data-sitekey="TU_RECAPTCHA_SITE_KEY"></div>

    <button onclick="login()">Entrar</button>
    <div class="msg" id="msg"></div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://bdngrgorvczujhkyzbkl.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkbmdyZ29ydmN6dWpoa3l6YmtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MzYxMzAsImV4cCI6MjA4NjUxMjEzMH0.yjvRSBZ33VkL0JYgUtHUDNYybA2GUFvMMOnyyYbYOUo"
);

async function login(){

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const msg = document.getElementById("msg");

    const captcha = grecaptcha.getResponse();

    if(!captcha){
        msg.textContent = "Verifica el captcha";
        return;
    }

    // 🔐 Login con Supabase Auth (MEJOR OPCIÓN)
    const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
    });

    if(error){
        msg.textContent = "Credenciales incorrectas";
    }else{
        msg.style.color="green";
        msg.textContent = "Login correcto";
        // window.location = "dashboard.html";
    }
}
</script>

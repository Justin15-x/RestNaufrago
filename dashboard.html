<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración - El Náufrago</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: #2a2a2a; padding: 30px; border-radius: 10px; }
        .admin-section { display: none; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #333; }
        th, td { border: 1px solid #444; padding: 12px; text-align: left; }
        th { background-color: #004466; }
        button { padding: 8px 12px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: 0.3s; }
        .btn-logout { background: #ff4444; color: white; float: right; }
        .btn-role { background: #0088cc; color: white; margin-right: 5px; }
        .btn-delete { background: #cc0000; color: white; }
        .btn-kick { background: #ffaa00; color: black; }
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 0.8em; background: #444; }
    </style>
</head>
<body>

<div class="container">
    <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    <h1>⚓ Dashboard Administrativo</h1>
    <p>Bienvenido: <strong id="userEmail">Cargando...</strong></p>

    <hr>

    <div id="adminPanel" class="admin-section">
        <h2>👥 Gestión de Usuarios y Roles</h2>
        <table>
            <thead>
                <tr>
                    <th>Email</th>
                    <th>Rol Actual</th>
                    <th>Acciones de Rango</th>
                </tr>
            </thead>
            <tbody id="usersTable"></tbody>
        </table>

        <br>

        <h2>📱 Monitoreo de Sesiones Activas</h2>
        <p style="font-size: 0.9em; color: #aaa;">(Requisito: Manejo de multisesiones y expulsión de usuarios)</p>
        <table>
            <thead>
                <tr>
                    <th>Usuario</th>
                    <th>Dispositivo / Navegador</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="sessionsTable"></tbody>
        </table>
    </div>
</div>

<script type="module">
    const supabase = window.supabase.createClient(
        "https://bdngrgorvczujhkyzbkl.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkbmdyZ29ydmN6dWpoa3l6YmtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MzYxMzAsImV4cCI6MjA4NjUxMjEzMH0.yjvRSBZ33VkL0JYgUtHUDNYybA2GUFvMMOnyyYbYOUo"
    );

    // FUNCIÓN DE INICIO (Centraliza la seguridad)
    async function init() {
        const { data: { session } } = await supabase.auth.getSession();

        // 1. Middleware Avanzado: Autenticación basada en Tokens
        if (!session) {
            window.location.href = "login.html";
            return;
        }

        // 2. Monitoreo de sesión activa (Parte 5 de la práctica)
        const { data: activeSession } = await supabase
            .from("sessions")
            .select("*")
            .eq("user_id", session.user.id)
            .maybeSingle();

        if (!activeSession) {
            await supabase.auth.signOut();
            alert("Tu sesión ha sido revocada por seguridad.");
            window.location.href = "login.html";
            return;
        }

        // 3. Registro y Monitoreo (Audit Logs)
        await supabase.from("audit_logs").insert({
            user_id: session.user.id,
            action: "Acceso a Dashboard Administrativo"
        });

        // 4. Autorización basada en Roles (RBAC)
        const { data: profile } = await supabase
            .from("profiles")
            .select("role")
            .eq("id", session.user.id)
            .maybeSingle();

        if (!profile || profile.role !== 'admin') {
            alert("Acceso denegado: Se requiere rol de Administrador.");
            window.location.href = "login.html";
            return;
        }

        // Si todo es correcto, mostramos la interfaz
        document.getElementById("userEmail").textContent = session.user.email;
        document.getElementById("adminPanel").style.display = "block";
        loadUsers();
        loadSessions();
    }

    // --- CARGA DE DATOS ---
    async function loadUsers() {
        const { data: users } = await supabase.from("profiles").select("*");
        const table = document.getElementById("usersTable");
        table.innerHTML = "";
        users?.forEach(u => {
            table.innerHTML += `
                <tr>
                    <td>${u.email}</td>
                    <td><span class="status-badge">${u.role}</span></td>
                    <td>
                        <button class="btn-role" onclick="updateRole('${u.id}', 'admin')">Admin</button>
                        <button class="btn-role" onclick="updateRole('${u.id}', 'mesero')">Mesero</button>
                        <button class="btn-delete" onclick="deleteUser('${u.id}')">Eliminar</button>
                    </td>
                </tr>`;
        });
    }

    async function loadSessions() {
        const { data: sessions } = await supabase
            .from("sessions")
            .select(`id, user_agent, profiles(email)`);
        
        const table = document.getElementById("sessionsTable");
        table.innerHTML = "";
        sessions?.forEach(s => {
            table.innerHTML += `
                <tr>
                    <td>${s.profiles?.email || 'Desconocido'}</td>
                    <td style="font-size: 0.7em;">${s.user_agent}</td>
                    <td><button class="btn-kick" onclick="closeSession('${s.id}')">Finalizar</button></td>
                </tr>`;
        });
    }

    // --- FUNCIONES GLOBALES ---
    window.updateRole = async (id, newRole) => {
        await supabase.from("profiles").update({ role: newRole }).eq("id", id);
        loadUsers();
    };

    window.closeSession = async (sessionId) => {
        if (confirm("¿Expulsar sesión?")) {
            await supabase.from("sessions").delete().eq("id", sessionId);
            loadSessions();
        }
    };

    window.logout = async () => {
        await supabase.auth.signOut();
        window.location.href = "login.html";
    };

    init(); // Ejecutar al cargar
</script>
</html>
